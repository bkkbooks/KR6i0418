body:
  text: 後漢安息三藏安世高譯如是我聞一時佛住王舍城耆闍崛山中與大菩薩摩訶薩及聲聞眷屬俱亦與比丘比丘尼優婆塞優婆夷及諸天龍鬼神等皆悉集會爾時信相菩薩白佛言世尊今有地獄餓鬼畜生奴婢貧富貴賤種類若干唯願世尊具演說法若有衆生聞佛說法如孩子得母如病得醫如羸得食如暗得燈世尊說法利益衆生亦復如是爾時世尊觀時已至見斯菩薩勸請殷勤即放眉間白毫相光照于世界地獄休息苦痛安寧爾時一切受罪衆生尋佛光明來詣佛所繞佛七匝為佛作禮勸請世尊敷演道化令此衆生得蒙解脫爾時信相菩薩為諸衆生而作發起前白佛言世尊今有受罪衆生為諸獄卒銼碓斬身從頭至足乃至其頂斬之已訖巧風吹活而復斬之何罪所致佛言以前世時坐不信三尊不孝父母屠兒魁膾斬截衆生故獲斯罪第二復有衆生身體頑痺眉鬚墮落舉身洪爛鳥栖鹿宿人跡永絶沾污親族人不喜見名之癩病何罪所致佛言以前世時坐不信三尊不孝父母破壞塔寺剝脫道人斬射賢聖傷害師長常無返復背恩忘義常行苟且淫匿尊卑無所忌諱故獲斯罪第三復有衆生身體長大聾騃無足宛轉腹行唯食泥土以自活命為諸小蟲之所唼食常受此苦不可堪處何罪所致佛言以前世時坐為人自用不信好言善語不孝父母反戾時君或為帝主大臣四鎮方伯州郡令長吏禁督護恃其威勢侵奪民物無有道理使民苦悴吁嗟而行故獲斯罪第四復有衆生兩目盲瞎都無所見或抵樹木或墮溝坑於時死已更復受身亦復如是何罪所致佛言以前世時坐不信罪福障佛光明縫鷹眼合籠繫衆生皮囊盛頭不得所見故獲斯罪第五復有衆生謇吃瘖啞口不能言若有所說閉目舉手乃不言了何罪所致佛言以前世時坐誹謗三尊輕毀聖道論他好醜求人長短強誣良善憎嫉賢人故獲斯罪第六復有衆生腹大頸細不能下食若有所食變為膿血何罪所致佛言以前世時偷盜僧食或為大會福食屏處偷噉吝惜己物但貪他財常行惡心與人毒藥氣息不通故獲斯罪第七復有衆生常為獄卒熱燒鐵釘釘人百節骨頭釘之已訖自然火生焚燒身體悉皆焦爛何罪所致佛言以前世時坐為針灸醫師針人身體不能差病誑他取財徒受苦痛令他苦惱故獲斯罪第八復有衆生常在鑊湯中為牛頭阿傍以三股鐵叉叉人內著鑊湯中煮之令爛還復吹活而復煮之何罪所致佛言以前世時信邪倒見祠祀鬼神屠殺衆生湯灌搣毛鑊湯煎煮不可限量故獲斯罪第九復有衆生常在火城中煻煨齊心四門俱開若欲趣向門即閉之東西馳走不能自免為火燒盡何罪所致佛言以前世時坐焚燒山澤火煨雞子燒他村陌燒煮衆生身爛皮剝故獲斯罪第十復有衆生常在雪山中寒風所吹皮肉剝裂求死不得何罪所致佛言以前世時坐橫道作賊剝脫人衣使冬月之日令他凍死生㓟牛羊痛不可堪故獲斯罪第十一復有衆生常在刀山劍樹上若有所投即便割傷支節斷壞何罪所致佛言以前世時坐屠殺為業烹害衆生屠割剝裂骨肉分離頭腳星散懸於高格稱量而賣或復生懸衆生苦痛難處故獲斯罪第十二復有衆生五根不具何罪所致佛言以前世時坐飛鷹走狗彈射禽獸或斷其頭或斷其足生搣鳥翼故獲斯罪第十三復有衆生攣躄背僂腰髖不遂腳跛手拘不能操涉何罪所致佛言以前世時坐為人憯剋行道安槍或安射窠施張弶穽陷墜衆生頭破腳折傷損非一故獲斯罪第十四復有衆生常為獄卒桎梏其身不得免脫何罪所致佛言以前世時坐網捕衆生籠繫而畜飢窮困苦或為宰主令長貪取財錢枉繫良善怨苦號天不得縱意故獲斯罪第十五復有衆生或癲或狂或癡或騃不別好醜何罪所致佛言以前世時坐飲酒醉亂犯三十六失後得癡身如似醉人不識尊卑不別好醜八萬劫墮沸屎地獄獄卒斬銼求死不得求生不得五窮六極長夜受苦以坐貪酒過受罪已始得為人癃殘跛蹇為人之所憎嫉行逢接他橫事常無樂時以酒過犯故獲斯罪第十六復有衆生其形甚小陰藏甚大挽之身疲皆復進引行立坐臥以之為妨何罪所致佛言以前世時坐治生販賣自譽己物毀呰他財囂升弄㪷躡稱前後欺誑於人故獲斯罪第十七復有衆生男根不具為黃門身不得妻娶何罪所致佛言以前世時坐喜犍象馬牛羊猪狗不可稱數令此衆生苦痛難忍死而復穌故獲斯罪第十八復有衆生從生至老無有兒子孤立獨存何罪所致佛言以前世時坐為人暴惡不信罪福百鳥産乳之時齎持瓶器循大水渚求拾鴻鵠鸚鵡鵝鴈諸鳥子卵擔歸煮噉諸鳥失子悲鳴叫裂眼中血出故獲斯罪第十九復有衆生少小孤寒無有父母兄弟為他作使辛苦活命長大成人橫羅殃禍縣官所縛繫閉牢獄無人追餉飢窮困苦無所告及何罪所致佛言以前世時坐喜捕拾鵰鷲鷹鷂熊羆虎豹枷鎖而畜孤此衆生父母兄弟常恆憂念悲鳴叫裂哀感人心不能供養常苦飢餓骨立皮連求死不得故獲斯罪第二十復有衆生其形甚醜身體黑如漆兩目復青頭頰俱垖皰面平鼻兩目黃赤牙齒踈缺口氣腥臭矬短癰腫大腹腰髖腳復繚戾僂脊匡肋費衣健食惡瘡膿血水腫乾痟疥癩癰疽種種諸惡集在其身雖親附人人不在意若他作罪橫羅其殃永不見佛永不聞法永不識僧何罪所致佛言以前世時坐為子不孝父母為臣不忠其君為君不敬其下朋友不以其信鄉黨不以其齒朝廷不以其爵趣為趣作心意顛倒無有其度不信三尊殺君害師伐國掠民攻城破塢偷寨過盜惡業非一美己惡人侵陵孤老誣謗賢聖輕慢尊長欺誑下賤一切罪業悉具犯之衆惡集報故獲斯罪爾時一切諸受罪衆生聞佛作如是說悲㘁動地淚下如雨而白佛言唯願世尊久住說法令我等輩而得解脫佛言若我久住薄德之人不種善根謂我常在不念無常善男子譬如孩兒母常在側不生難遭之想若母去者便生渴仰思戀之心母方還來乃生歡喜善男子我今亦復如是知諸衆生善惡業緣受報好醜故般涅槃爾時世尊即為此諸受罪衆生而說偈言水流不常滿火盛不久然日出須臾沒月滿已復缺尊榮豪貴者無常復過是念當勤精進頂禮無上尊爾時世尊說斯偈已諸受罪衆生白佛言世尊修何善行得離斯苦佛言當勤孝順父母敬事師長歸奉三尊勤行布施持戒忍辱精進禪定智慧慈悲喜捨怨親平等同己無二不欺孤老不輕下賤護彼如己汝等若能如是修行則為已得報佛之恩永離衆苦說是經已菩薩摩訶薩即得阿耨多羅三藐三菩提聲聞緣覺即得六通三明具八解脫有得法眼淨若有衆生得聞是經不墮三塗八難之處地獄休息苦痛安寧爾時信相菩薩白佛言當何名此經云何奉持佛告信相菩薩善男子此經名為罪業報應教化地獄經當奉持之廣令流布功德無量諸天大衆聞經歡喜五體投地作禮奉行
